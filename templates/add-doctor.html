{% extends "base.html" %}

{% block title %}Add Doctor - LeadFlow{% endblock %}
{% block page_title %}Add Doctor{% endblock %}

{% block content %}
<div class="p-8">
    <!-- Page Header -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-slate-900">Add New Doctor</h1>
        <p class="text-slate-600 mt-2">Register a new doctor to the clinic</p>
    </div>

    <!-- Form Container -->
    <div class="bg-white rounded-2xl shadow-lg p-8 max-w-2xl">
        <form method="POST" action="{{ url_for('add_doctor') }}" class="space-y-6">
            <!-- Full Name -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Full Name</label>
                <input type="text" name="name" placeholder="Enter doctor's full name" 
                    class="w-full px-4 py-3 border border-slate-300 rounded-xl 
                    focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" required>
            </div>

            <!-- Specialty -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Specialty</label>
                <select name="specialty" class="w-full px-4 py-3 border border-slate-300 rounded-xl 
                    focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" required>
                    <option value="">Select Specialty</option>
                    <option value="Dermatology">Dermatology</option>
                    <option value="Cosmetic Surgery">Cosmetic Surgery</option>
                    <option value="General Medicine">General Medicine</option>
                    <option value="Pediatrics">Pediatrics</option>
                    <option value="Cardiology">Cardiology</option>
                </select>
            </div>

            <!-- Years of Experience -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Years of Experience</label>
                <input type="number" name="experience" placeholder="Enter years of experience" 
                    class="w-full px-4 py-3 border border-slate-300 rounded-xl 
                    focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" required>
            </div>

            <!-- Phone Number -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Phone Number</label>
                <input type="tel" name="phone" placeholder="Enter phone number" 
                    class="w-full px-4 py-3 border border-slate-300 rounded-xl 
                    focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" required>
            </div>

            <!-- Email Address -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                <input type="email" name="email" placeholder="Enter email address" 
                    class="w-full px-4 py-3 border border-slate-300 rounded-xl 
                    focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" required>
            </div>

            <!-- Availability -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Availability</label>
                <input type="text" name="availability" placeholder="e.g., Mon-Fri 9:00-17:00" 
                    class="w-full px-4 py-3 border border-slate-300 rounded-xl 
                    focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200">
            </div>

            <!-- Status -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Status</label>
                <select name="status" class="w-full px-4 py-3 border border-slate-300 rounded-xl 
                    focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200">
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>

            <!-- Form Buttons -->
            <div class="flex gap-4 pt-6">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 
                    rounded-xl font-semibold transition-all duration-200 shadow-md hover:shadow-lg">
                    Save Doctor
                </button>
                <a href="{{ url_for('doctors') }}" class="bg-slate-100 hover:bg-slate-200 text-slate-900 px-8 py-3 
                    rounded-xl font-semibold transition-all duration-200 inline-block">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
