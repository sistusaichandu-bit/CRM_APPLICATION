<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow - Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        
        input:focus {
            outline: none;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>

<body class="bg-gradient-to-br from-blue-600 to-indigo-700 min-h-screen flex items-center justify-center p-4">
    
    <div class="w-full max-w-md fade-in">
        
        <!-- Glass Login Card -->
        <div class="glass-card rounded-3xl shadow-2xl p-8">
            
            <!-- Logo & Branding -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 mx-auto mb-6 bg-gradient-to-br from-blue-100 to-indigo-100 rounded-2xl flex items-center justify-center overflow-hidden shadow-md">
                    <img src="{{ url_for('static', filename='images/leadflow-logo.png') }}" alt="LeadFlow" class="w-10 h-10 object-contain" onerror="this.parentElement.innerHTML='💊';">
                </div>
                <h1 class="text-4xl font-bold text-slate-900 mb-2">Welcome to LeadFlow</h1>
                <p class="text-slate-600 font-medium">Clinic Management System</p>
            </div>
            
            <!-- Messages -->
            <div id="errorMsg" class="hidden mb-6 p-4 bg-red-50 border border-red-200 rounded-2xl text-red-700 text-sm font-medium shadow-sm"></div>
            <div id="successMsg" class="hidden mb-6 p-4 bg-green-50 border border-green-200 rounded-2xl text-green-700 text-sm font-medium shadow-sm"></div>
            
            <!-- Login Form -->
            <form id="loginForm" class="space-y-5" onsubmit="handleLogin(event)">
                
                <!-- Email -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                    <input type="email" id="email" placeholder="admin@leadflow.com" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 transition-all duration-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm hover:shadow-md" required>
                </div>
                
                <!-- Password -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-semibold text-slate-700">Password</label>
                        <a href="javascript:void(0);" onclick="handleForgotPassword()" class="text-xs font-semibold text-blue-600 hover:text-blue-700 transition-colors duration-200">Forgot password?</a>
                    </div>
                    <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 transition-all duration-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm hover:shadow-md" required>
                </div>
                
                <!-- Remember Me -->
                <div class="flex items-center gap-3 pt-1">
                    <input type="checkbox" id="remember" class="w-4 h-4 rounded border-slate-300 bg-white cursor-pointer accent-blue-600">
                    <label for="remember" class="text-sm text-slate-600 cursor-pointer">Remember me</label>
                </div>
                
                <!-- Sign In Button -->
                <button type="submit" id="loginBtn" class="w-full py-3 px-4 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 transition-all duration-300 transform hover:shadow-lg active:scale-95 shadow-md mt-6">
                    Sign In
                </button>
                
                <!-- Security Notice -->
                <div class="text-center text-xs text-slate-500 pt-2">
                    🔐 Your data is encrypted and secure
                </div>
            </form>
            
            <!-- Support Link -->
            <div class="mt-8 pt-6 border-t border-slate-200 text-center text-sm text-slate-600">
                Need help? <a href="javascript:void(0);" onclick="handleSupport()" class="font-semibold text-blue-600 hover:text-blue-700 transition-colors duration-200">Contact support</a>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const btn = document.getElementById('loginBtn');
            
            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }
            
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('Please enter a valid email');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            
            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    if (remember) localStorage.setItem('rememberEmail', email);
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => window.location.href = '/dashboard', 1500);
                } else {
                    showError(data.message || 'Login failed');
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                }
            })
            .catch(() => {
                showError('Connection error');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            });
        }
        
        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorMsg').classList.remove('hidden');
            document.getElementById('successMsg').classList.add('hidden');
        }
        
        function showSuccess(msg) {
            document.getElementById('successMsg').textContent = msg;
            document.getElementById('successMsg').classList.remove('hidden');
            document.getElementById('errorMsg').classList.add('hidden');
        }
        
        function handleForgotPassword() {
            alert('Password reset coming soon!');
        }
        
        function handleSupport() {
            alert('Email: support@leadflow.com\nPhone: 1-800-LEADFLOW');
        }
        
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('rememberEmail');
            if (saved) {
                document.getElementById('email').value = saved;
                document.getElementById('remember').checked = true;
            }
        });
    </script>
</body>

</html>
