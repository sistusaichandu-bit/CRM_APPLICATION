{% extends "base.html" %}

{% block title %}Add Lead - LeadFlow{% endblock %}
{% block page_title %}Add Lead{% endblock %}

{% block content %}
<div class="p-8">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-slate-900">Add New Lead</h1>
        <p class="text-slate-600 mt-2">Create a new lead entry</p>
    </div>

    <div class="bg-white rounded-2xl shadow-lg p-8 max-w-2xl">
        <form method="POST" action="{{ url_for('add_lead') }}" class="space-y-6">
            <!-- Name -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Full Name</label>
                <input type="text" name="name" placeholder="Enter patient name" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" required>
            </div>

            <!-- Phone -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Phone</label>
                <input type="tel" name="phone" placeholder="(555) 123-4567" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" required>
            </div>

            <!-- Email (optional) -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Email (optional)</label>
                <input type="email" name="email" placeholder="email@example.com" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200">
            </div>

            <!-- Service -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Service Interested In</label>
                <select name="service" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" required>
                    <option value="">Select service</option>
                    <option>Acne Treatment</option>
                    <option>Hair Fall Control</option>
                    <option>Anti-Aging</option>
                    <option>Eczema Treatment</option>
                    <option>Psoriasis</option>
                </select>
            </div>

            <!-- Source -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Lead Source</label>
                <select name="source" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" required>
                    <option value="">Select source</option>
                    <option>Facebook</option>
                    <option>Google</option>
                    <option>Instagram</option>
                    <option>Referral</option>
                    <option>Website</option>
                </select>
            </div>

            <!-- Doctor -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Assigned Doctor</label>
                <select name="assigned_to" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" required>
                    <option value="">Select doctor</option>
                    {% for doctor in doctors %}
                        <option value="{{ doctor.doctor_id }}">{{ doctor.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Notes -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Notes</label>
                <textarea name="notes" placeholder="Add any additional notes..." rows="4" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"></textarea>
            </div>

            <!-- Buttons -->
            <div class="flex gap-4 pt-4">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-semibold transition-all duration-200 shadow-md hover:shadow-lg">
                    Create Lead
                </button>
                <a href="{{ url_for('leads') }}" class="bg-slate-200 hover:bg-slate-300 text-slate-900 px-8 py-3 rounded-xl font-semibold transition-all duration-200">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
